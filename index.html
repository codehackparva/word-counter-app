<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Word Counter - Professional Text Analysis</title>
    <meta name="description" content="Free online word counter and text analysis tool. Count words, letters, characters, and sentences instantly.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Sans+Gujarati:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600&family=Noto+Sans+Tamil:wght@400;500;600&family=Noto+Sans+Telugu:wght@400;500;600&family=Noto+Sans+Kannada:wght@400;500;600&family=Noto+Sans+Malayalam:wght@400;500;600&family=Noto+Sans+Gurmukhi:wght@400;500;600&family=Noto+Sans+Oriya:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-background font-body-md text-on-surface flex flex-col min-h-screen">
    <!-- TopNavBar -->
    <nav class="bg-background border-b border-surface-variant sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-[900px] mx-auto px-lg py-md w-full">
            <h1 class="font-display-lg text-display-lg text-primary tracking-tight">Word Counter</h1>
            <div class="relative group">
                <button class="flex items-center gap-2 px-md py-sm bg-surface-container rounded-lg font-label-md text-label-md hover:bg-surface-container-high transition-colors" id="lang-toggle">
                    <span class="material-symbols-outlined">language</span>
                    <span class="">English</span>
                    <span class="material-symbols-outlined">expand_more</span>
                </button>
                <div class="hidden absolute right-0 mt-2 w-48 bg-surface-container-lowest border border-surface-variant rounded-lg shadow-lg overflow-hidden z-50" id="lang-dropdown">
                    <div class="max-h-60 overflow-y-auto">
                        <div class="px-md py-sm hover:bg-surface-container-high cursor-pointer" data-lang="English">English</div>
                        <div class="px-md py-sm hover:bg-surface-container-high cursor-pointer" data-lang="Gujarati">Gujarati</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow w-full max-w-[900px] mx-auto px-lg py-xl space-y-lg">
        <!-- Editor Card -->
        <section class="bg-surface-container-lowest border border-surface-variant rounded-lg shadow-sm overflow-hidden relative">
            <div class="p-xs absolute top-4 right-4 pointer-events-none">
                <span class="hidden bg-primary-fixed text-primary px-3 py-1 rounded-full text-label-sm font-label-sm flex items-center gap-1 animate-pulse" id="detect-badge">
                    <span class="material-symbols-outlined text-[14px]">bolt</span>
                    Auto-detect active
                </span>
            </div>
            <textarea class="w-full min-h-[300px] p-lg border-none focus:ring-0 text-body-lg font-body-lg resize-none placeholder:text-outline-variant bg-transparent textarea-focus-glow transition-all duration-200" id="main-editor" placeholder="Start typing or paste your English text here..." spellcheck="false" aria-label="Text input for word and letter counting"></textarea>
            <div id="lang-warning" class="hidden mx-lg mb-md mt-1 flex items-center gap-2 bg-error-container/30 px-3 py-2 rounded-lg border border-error/20">
                <span class="material-symbols-outlined text-[18px] text-error">warning</span>
                <p class="text-label-sm text-error font-medium">માત્ર ગુજરાતી ભાષા સ્વીકાર્ય છે. કૃપા કરી ફક્ત ગુજરાતી લખો.</p>
            </div>
            <!-- Half-letter toggle (Gujarati only) -->
            <div id="half-letter-bar" class="hidden mx-lg mb-md flex items-center justify-between gap-3 bg-surface-container px-4 py-2 rounded-lg border border-surface-variant">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px] text-secondary">text_fields</span>
                    <span class="text-label-sm font-label-sm text-on-surface-variant">Count half letters as full</span>
                    <span class="text-label-sm text-outline" title="e.g. સ્વ counts as 2 letters (સ + વ) instead of 1">
                        <span class="material-symbols-outlined text-[15px] align-middle cursor-help">info</span>
                    </span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer" id="half-letter-label">
                    <input type="checkbox" id="half-letter-toggle" class="sr-only peer">
                    <div class="w-10 h-5 bg-surface-variant rounded-full peer peer-checked:bg-primary transition-colors duration-200"></div>
                    <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-5"></div>
                </label>
            </div>
        </section>
        <!-- Stat Pills Grid -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-md">
            <div class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Words</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="word-count">0</span>
            </div>
            <div class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Letters</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="letter-count">0</span>
            </div>
            <div class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Characters</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="char-count">0</span>
            </div>
            <div class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Sentences</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="sentence-count">0</span>
            </div>
        </section>
    </main>
    <!-- Bottom Footer Toolbar -->
    <footer class="bg-surface-container-lowest border-t border-surface-variant mt-auto py-md">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-[900px] mx-auto px-lg w-full gap-md">
            <div class="flex items-center gap-lg">
                <button class="group flex flex-col items-center gap-1 transition-all active:scale-95" id="clear-btn" title="Clear text">
                    <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container group-hover:bg-error-container group-hover:text-error transition-colors">
                        <span class="material-symbols-outlined">delete</span>
                    </div>
                    <span class="font-label-sm text-label-sm text-secondary">Clear</span>
                </button>
            </div>
        </div>
    </footer>
    <script src="app.js"></script>
</body>

</html>
