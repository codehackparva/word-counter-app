        .hover\:bg-surface-container-high:hover {

        .hover\:bg-surface-container-low:hover {

        .hover\:text-error:hover {

        .hover\:text-primary:hover {

        .focus\:ring-0:focus {
            --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
            --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(var(--tw-ring-offset-width)) var(--tw-ring-color);
            box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000)
        }

        .active\:scale-95:active {

            transform: translate(var(--tw-translate-x), var(--tw-translate-y)) rotate(var(--tw-rotate)) skewX(var(--tw-skew-x)) skewY(var(--tw-skew-y)) scaleX(var(--tw-scale-x)) scaleY(var(--tw-scale-y))
        }

        .group:hover .group-hover\:bg-error-container {

        .group:hover .group-hover\:text-error {
            --tw-text-opacity: 1;

        }

        .group:hover .group-hover\:text-on-primary-container {
            --tw-text-opacity: 1;
            color: rgb(218 215 255/var(--tw-text-opacity, 1))
        }

        .group:hover .group-hover\:text-primary {

        }

        @media (min-width:768px) {
            .md\:grid-cols-4 {

            }

            .md\:flex-row {

            }
        }
    </style>

<body class="bg-background font-body-md text-on-surface flex flex-col min-h-screen">
    <!-- TopNavBar -->
    <nav class="bg-background border-b border-surface-variant sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-[900px] mx-auto px-lg py-md w-full">
            <h1 class="font-display-lg text-display-lg text-primary tracking-tight">Word Counter</h1>
            <div class="relative group">
                <button
                    class="flex items-center gap-2 px-md py-sm bg-surface-container rounded-lg font-label-md text-label-md hover:bg-surface-container-high transition-colors"
                    id="lang-toggle">
                    <span class="material-symbols-outlined">language</span>
                    <span class="">English</span>
                    <span class="material-symbols-outlined">expand_more</span>
                </button>
                <div class="hidden absolute right-0 mt-2 w-48 bg-surface-container-lowest border border-surface-variant rounded-lg shadow-lg overflow-hidden z-50"
                    id="lang-dropdown">
                    <div class="max-h-60 overflow-y-auto">
                        <div class="px-md py-sm hover:bg-surface-container-high cursor-pointer" data-lang="English">English</div>
                        <div class="px-md py-sm hover:bg-surface-container-high cursor-pointer" data-lang="Gujarati">Gujarati</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow w-full max-w-[900px] mx-auto px-lg py-xl space-y-lg">
        <!-- Editor Card -->
        <section
            class="bg-surface-container-lowest border border-surface-variant rounded-lg shadow-sm overflow-hidden relative">
            <div class="p-xs absolute top-4 right-4 pointer-events-none">
                <span
                    class="hidden bg-primary-fixed text-primary px-3 py-1 rounded-full text-label-sm font-label-sm flex items-center gap-1 animate-pulse"
                    id="detect-badge">
                    <span class="material-symbols-outlined text-[14px]">bolt</span>
                    Auto-detect active
                </span>
            </div>
            <textarea
                class="w-full min-h-[300px] p-lg border-none focus:ring-0 text-body-lg font-body-lg resize-none placeholder:text-outline-variant bg-transparent textarea-focus-glow transition-all duration-200"
                id="main-editor" placeholder="Start typing or paste your English text here..." spellcheck="false"
                aria-label="Text input for word and letter counting"></textarea>
            <div id="lang-warning" class="hidden mx-lg mb-md mt-1 flex items-center gap-2 bg-error-container/30 px-3 py-2 rounded-lg border border-error/20">
                <span class="material-symbols-outlined text-[18px] text-error">warning</span>
                <p class="text-label-sm text-error font-medium">માત્ર ગુજરાતી ભાષા સ્વીકાર્ય છે. કૃપા કરી ફક્ત ગુજરાતી લખો.</p>
            </div>
        </section>
        <!-- Stat Pills Grid -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-md">
            <div
                class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Words</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="word-count">0</span>
            </div>
            <div
                class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Letters</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="letter-count">0</span>
            </div>
            <div
                class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Characters</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="char-count">0</span>
            </div>
            <div
                class="bg-surface-container border border-surface-variant p-md rounded-lg flex flex-col items-center justify-center space-y-1 hover:border-primary/30 transition-all cursor-default">
                <span class="text-secondary font-label-sm text-label-sm">Sentences</span>
                <span class="font-stat-value text-stat-value text-on-surface" id="sentence-count">0</span>
            </div>
        </section>
    </main>
    <!-- Bottom Footer Toolbar -->
    <footer class="bg-surface-container-lowest border-t border-surface-variant mt-auto py-md">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-[900px] mx-auto px-lg w-full gap-md">
            <div class="flex items-center gap-lg">
                <button class="group flex flex-col items-center gap-1 transition-all active:scale-95" id="clear-btn"
                    title="Clear text">
                    <div
                        class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container group-hover:bg-error-container group-hover:text-error transition-colors">
                        <span class="material-symbols-outlined">delete</span>
                    </div>
                    <span class="font-label-sm text-label-sm text-secondary">Clear</span>
                </button>

            </div>

        </div>
    </footer>
    <script>
        const editor = document.getElementById('main-editor');
        const wordCount = document.getElementById('word-count');
        const letterCount = document.getElementById('letter-count');
        const charCount = document.getElementById('char-count');
        const sentenceCount = document.getElementById('sentence-count');
        const badge = document.getElementById('detect-badge');
        const langToggle = document.getElementById('lang-toggle');
        const langDropdown = document.getElementById('lang-dropdown');
        const langLabel = langToggle.querySelector('span:nth-child(2)');
        const langWarning = document.getElementById('lang-warning');

        let currentLang = 'English';

        // ── Gujarati helpers ─────────────────────────────────────────────────
        const GU = /[\u0A80-\u0AFF]/;

        function isGujaratiOnly(text) {
            if (!text.trim()) return true;
            // Allow Gujarati chars, spaces, digits, common punctuation
            return /^[\u0A80-\u0AFF\s\d\u0964\u0965.,!?"'()\-*#_:;%@&+=\/\\]+$/.test(text);
        }

        function countGujarati(text) {
            if (!text.trim()) return { words: 0, letters: 0, chars: 0, sentences: 0 };

            // Letters = Gujarati grapheme clusters
            let letters = 0;
            try {
                const seg = new Intl.Segmenter('gu', { granularity: 'grapheme' });
                for (const { segment } of seg.segment(text)) {
                    if (GU.test(segment)) letters++;
                }
            } catch {
                letters = (text.match(/[\u0A80-\u0AFF]/gu) || []).length;
            }

            // Words = Gujarati word tokens
            let words = 0;
            try {
                const seg = new Intl.Segmenter('gu', { granularity: 'word' });
                for (const w of seg.segment(text)) {
                    if (w.isWordLike && GU.test(w.segment)) words++;
                }
            } catch {
                words = text.trim().split(/\s+/).filter(s => GU.test(s)).length;
            }

            const chars = [...text].length;
            const sentences = (text.match(/[^.!?\u0964\u0965]+[.!?\u0964\u0965]+/g) || (text.trim() ? [text] : [])).length;

            return { words, letters, chars, sentences };
        }

        // ── English helpers ──────────────────────────────────────────────────
        function countEnglish(text) {
            if (!text.trim()) return { words: 0, letters: 0, chars: 0, sentences: 0 };

            const words    = text.trim().split(/\s+/).filter(s => s.length > 0).length;
            const letters  = (text.match(/[a-zA-Z]/g) || []).length;
            const chars    = text.length;
            const sentences = (text.match(/[^.!?]+[.!?]+/g) || (text.trim() ? [text] : [])).length;

            return { words, letters, chars, sentences };
        }

        // ── Update display ───────────────────────────────────────────────────
        function updateDisplay(stats) {
            wordCount.textContent     = stats.words;
            letterCount.textContent   = stats.letters;
            charCount.textContent     = stats.chars;
            sentenceCount.textContent = stats.sentences;
        }

        // ── Main input handler ───────────────────────────────────────────────
        function onEditorInput() {
            const text = editor.value;

            // Auto-grow textarea
            editor.style.height = 'auto';
            editor.style.height = editor.scrollHeight + 'px';

            if (currentLang === 'Gujarati') {
                if (text.trim() && !isGujaratiOnly(text)) {
                    langWarning.classList.remove('hidden');
                    updateDisplay({ words: 0, letters: 0, chars: 0, sentences: 0 });
                    return;
                }
                langWarning.classList.add('hidden');
                updateDisplay(countGujarati(text));
            } else {
                langWarning.classList.add('hidden');
                updateDisplay(countEnglish(text));
            }
        }

        editor.addEventListener('input', onEditorInput);

        // ── Language switcher ────────────────────────────────────────────────
        function applyLanguage(lang) {
            currentLang = lang;
            langLabel.textContent = lang;
            langDropdown.classList.add('hidden');

            if (lang === 'English') {
                editor.placeholder = 'Start typing or paste your English text here...';
            } else {
                editor.placeholder = 'અહીં ગુજરાતી લખો અથવા પેસ્ટ કરો...';
            }

            editor.value = '';
            langWarning.classList.add('hidden');
            updateDisplay({ words: 0, letters: 0, chars: 0, sentences: 0 });
            editor.focus();
        }

        // Toggle dropdown
        langToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            langDropdown.classList.toggle('hidden');
        });

        // Close dropdown on outside click
        document.addEventListener('click', () => langDropdown.classList.add('hidden'));

        // Dropdown item clicks
        langDropdown.querySelectorAll('[data-lang]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                applyLanguage(item.dataset.lang);
            });
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            editor.value = '';
            langWarning.classList.add('hidden');
            updateDisplay({ words: 0, letters: 0, chars: 0, sentences: 0 });
            editor.focus();
        });





        // Initial state
        onEditorInput();
    </script>


</body>

</html>
